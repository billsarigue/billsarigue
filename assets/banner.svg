        cy="95"
        r="75"
        fill="#D3AF37"
        opacity="0.03"
        filter="url(#goldGlow)">

        <animate
            attributeName="opacity"
            values="0.02;0.08;0.02"
            dur="6s"
            repeatCount="indefinite"/>

    </circle>

    <!-- ========================================= -->
