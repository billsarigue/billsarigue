<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1983"
    height="793"
    viewBox="0 0 1983 793">

    <!-- Fundo -->
    <image
        href="banner.png"
        width="1983"
        height="793"/>

</svg>

<rect
    x="392"
    y="677"
    width="12"
    height="22"
    fill="#D3AF37">

    <animate
        attributeName="opacity"
        values="1;0;1"
        dur="1s"
        repeatCount="indefinite"/>

</rect>

<circle cx="1320" cy="130" r="2" fill="#D3AF37">

    <animate
        attributeName="opacity"
        values="0.2;1;0.2"
        dur="4s"
        repeatCount="indefinite"/>

</circle>

<circle cx="1380" cy="190" r="1.5" fill="#D3AF37">

    <animate
        attributeName="opacity"
        values="1;0.3;1"
        dur="6s"
        repeatCount="indefinite"/>

</circle>



<defs>

<linearGradient id="shine">

    <stop offset="0%" stop-color="white" stop-opacity="0"/>

    <stop offset="50%" stop-color="white" stop-opacity="0.5"/>

    <stop offset="100%" stop-color="white" stop-opacity="0"/>

</linearGradient>

</defs>


<rect
    x="-500"
    y="680"
    width="150"
    height="50"
    fill="url(#shine)"
    opacity="0.5">

    <animate
        attributeName="x"
        from="-500"
        to="2000"
        dur="8s"
        repeatCount="indefinite"/>

</rect>

<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="1536"
    height="614"
    viewBox="0 0 1536 614">

    <defs>

        <!-- Brilho metálico -->

        <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">

            <stop offset="0%" stop-color="white" stop-opacity="0"/>

            <stop offset="50%" stop-color="white" stop-opacity="0.55"/>

            <stop offset="100%" stop-color="white" stop-opacity="0"/>

        </linearGradient>

        <!-- Glow dourado -->

        <filter id="goldGlow">

            <feGaussianBlur stdDeviation="8"/>

        </filter>

    </defs>

    <!-- Banner original -->

    <image
        href="banner.png"
        x="0"
        y="0"
        width="1536"
        height="614"/>

    <!-- ========================================= -->
    <!-- CURSOR TERMINAL PISCANDO -->
    <!-- ========================================= -->

    <rect
        x="353"
        y="534"
        width="10"
        height="18"
        fill="#D3AF37">

        <animate
            attributeName="opacity"
            values="1;0;1"
            dur="1s"
            repeatCount="indefinite"/>

    </rect>

    <!-- ========================================= -->
    <!-- BRILHO PASSANDO PELO NOME -->
    <!-- ========================================= -->

    <rect
        x="-300"
        y="180"
        width="180"
        height="120"
        fill="url(#shine)"
        opacity="0.45">

        <animate
            attributeName="x"
